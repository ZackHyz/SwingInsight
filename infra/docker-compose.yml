services:
  postgres:
    image: postgres:16
    container_name: swinginsight-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swinginsight}
      POSTGRES_USER: ${POSTGRES_USER:-swinginsight}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swinginsight}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
