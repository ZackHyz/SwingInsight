<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SwingInsight</title>
    <style>
      body {
        margin: 0;
        font-family: "Helvetica Neue", Arial, sans-serif;
        background: linear-gradient(180deg, #f4f1e8 0%, #ece6d6 100%);
        color: #1f2a1f;
      }

      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 32px 20px 48px;
        display: grid;
        gap: 20px;
      }

      section,
      aside {
        background: rgba(255, 250, 240, 0.95);
        border: 1px solid #d7c9aa;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(70, 55, 20, 0.08);
      }

      h1,
      h2,
      h3,
      p,
      ul {
        margin-top: 0;
      }

      button {
        border: 1px solid #6d7f52;
        background: #eef5dd;
        border-radius: 999px;
        padding: 10px 16px;
        cursor: pointer;
      }

      ul {
        padding-left: 20px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
